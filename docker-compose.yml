# Optional local stack for development: a Trino coordinator and the MCP server
# image. The MCP server itself is designed to be launched on demand by your MCP
# client (e.g. Claude Desktop), so in day-to-day use you only need the Trino
# service here. Run with:
#
#   docker compose up -d trino
#   docker compose build trino-mcp  # builds the image so the client can run it
#
services:
  trino:
    image: trinodb/trino:latest
    container_name: trino
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10

  trino-mcp:
    build: .
    image: trino-mcp:latest
    # The server reads config from env vars; override as needed.
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: trino-mcp
      TRINO_HTTP_SCHEME: http
      TRINO_MAX_ROWS: "1000"
    depends_on:
      trino:
        condition: service_healthy
    # MCP speaks over stdio, so this service is not meant to be "up" long-term;
    # it exists so `docker compose build trino-mcp` produces the image your
    # MCP client will `docker run`.
    profiles: ["build-only"]
    stdin_open: true
    tty: false
